
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Mathématiques - 3AP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        .question { display: none; }
        .question.active { display: block; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: 2px solid #3498db; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #3498db; color: white; }
        button.correct { background: #2ecc71; border-color: #2ecc71; color: white; }
        button.wrong { background: #e74c3c; border-color: #e74c3c; color: white; }
        #next-btn { margin-top: 20px; padding: 10px 25px; background: #2c3e50; color: white; border: none; display: none; margin-left: auto; margin-right: auto; }
        .feedback { margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
        .lesson-tag { display: inline-block; padding: 5px 10px; background: #e67e22; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="question-wrapper">
        </div>
    <div id="feedback" class="feedback"></div>
    <button id="next-btn" onclick="nextQuestion()">Question suivante</button>
</div>

<script>
const quizData = [
    // LEÇON 1: ADDITION
    {
        lesson: "L'addition (0-999)",
        q: "Si on additionne 358 et 21, quel est le résultat ?",
        options: ["378", "379", "359", "389"],
        correct: 1,
        justification: "On additionne les unités : 8 + 1 = 9. Les dizaines : 5 + 2 = 7. Les centaines : 3 + 0 = 3. Soit 379[cite: 8]."
    },
    {
        lesson: "L'addition (0-999)",
        q: "Calcule : 615 + 34. N'oublie pas de bien aligner les chiffres !",
        options: ["649", "955", "641", "659"],
        correct: 0,
        justification: "5 + 4 = 9 (unités), 1 + 3 = 4 (dizaines), 6 + 0 = 6 (centaines). Résultat : 649[cite: 9, 13]."
    },
    {
        lesson: "L'addition (0-999)",
        q: "Quel est le résultat de 125 + 86 ?",
        options: ["201", "211", "210", "111"],
        correct: 1,
        justification: "5+6=11 (on écrit 1 et on retient 1). 2+8+1(retenue)=11 (on écrit 1 et on retient 1). 1+1(retenue)=2. Total : 211[cite: 45, 47]."
    },
    {
        lesson: "L'addition (0-999)",
        q: "Situation : Dans un jardin, il y a 247 fleurs rouges et 385 fleurs jaunes. Combien y a-t-il de fleurs en tout ?",
        options: ["622", "532", "632", "642"],
        correct: 2,
        justification: "C'est une addition avec retenues : 247 + 385 = 632."
    },
    // LEÇON 2: SOUSTRACTION
    {
        lesson: "La soustraction (0-999)",
        q: "Calcule la différence simple : 356 - 124.",
        options: ["230", "232", "222", "242"],
        correct: 1,
        justification: "Soustraction sans retenue : 6-4=2, 5-2=3, 3-1=2. Résultat : 232[cite: 91, 95, 100]."
    },
    {
        lesson: "La soustraction (0-999)",
        q: "Pour faire 230 - 121, de quoi as-tu besoin ?",
        options: ["Rien", "D'une retenue", "D'une multiplication", "D'une addition"],
        correct: 1,
        justification: "On ne peut pas retirer 1 de 0 aux unités, il faut donc faire un échange (une retenue)[cite: 136]."
    },
    {
        lesson: "La soustraction (0-999)",
        q: "Quel est le résultat de 871 - 256 ?",
        options: ["615", "625", "515", "616"],
        correct: 0,
        justification: "Après échange aux unités (11-6=5) et aux dizaines, on obtient 615[cite: 127, 131]."
    },
    {
        lesson: "La soustraction (0-999)",
        q: "Problème : La tour Mohammed VI compte 55 étages. 37 étages sont terminés. Combien d'étages reste-t-il à finir ?",
        options: ["28 étages", "12 étages", "18 étages", "22 étages"],
        correct: 2,
        justification: "On fait 55 - 37. Comme 5 < 7, on emprunte une dizaine : 15 - 7 = 8 et 4 - 3 = 1. Il reste 18 étages."
    }
];

let currentQuestion = 0;

function loadQuestion() {
    const data = quizData[currentQuestion];
    const container = document.getElementById('question-wrapper');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    
    feedback.style.display = 'none';
    nextBtn.style.display = 'none';
    
    container.innerHTML = `
        <div class="lesson-tag">${data.lesson}</div>
        <h2>Question ${currentQuestion + 1}: ${data.q}</h2>
        <div class="options">
            ${data.options.map((opt, i) => `<button onclick="checkAnswer(${i})">${opt}</button>`).join('')}
        </div>
    `;
}

function checkAnswer(index) {
    const data = quizData[currentQuestion];
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const buttons = document.querySelectorAll('.options button');
    
    buttons.forEach(btn => btn.disabled = true);
    
    if(index === data.correct) {
        buttons[index].classList.add('correct');
        feedback.innerHTML = "Bravo ! " + data.justification;
        feedback.style.background = "#d4edda";
        feedback.style.color = "#155724";
    } else {
        buttons[index].classList.add('wrong');
        buttons[data.correct].classList.add('correct');
        feedback.innerHTML = "Oups ! " + data.justification;
        feedback.style.background = "#f8d7da";
        feedback.style.color = "#721c24";
    }
    
    feedback.style.display = 'block';
    nextBtn.style.display = 'block';
}

function nextQuestion() {
    currentQuestion++;
    if(currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        document.getElementById('quiz-container').innerHTML = "<h2>Félicitations ! Tu as terminé le quiz.</h2><button onclick='location.reload()'>Recommencer</button>";
    }
}

loadQuestion();
</script>

</body>
</html>
